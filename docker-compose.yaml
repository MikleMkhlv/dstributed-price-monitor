version: '3.4'
services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: monitor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: my_redis
    restart: always
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=my_secure_password
    volumes:
      - redis_data:/data
    command: redis-server --requirepass my_secure_password --appendonly yes
  
  monitor:
    build:
      context: .
      dockerfile: ./cmd/monitor/Dockerfile
    ports:
      - "8081:8081"
    environment:
      APPLICATION_ADDRESS: "127.0.0.1"
      APPLICATION_PORT: "8081"
    volumes:
      - ./conf_test.yaml:/app/conf_test.yaml
    depends_on:
      - db
      - redis



volumes:
  postgres_data:
  redis_data:
